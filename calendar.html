<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartMkt AI — Lịch Content</title>
  <meta name="description" content="Lịch lên kế hoạch content đa kênh — TikTok, Facebook, Zalo, Instagram" />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="campaign.css" />
  <style>
    .cal-header { display:flex; align-items:center; gap:16px; margin-bottom:20px; }
    .cal-nav-btn { background:var(--bg-700); border:1px solid var(--border); color:var(--text-1); border-radius:10px; padding:8px 16px; cursor:pointer; font-size:16px; font-weight:700; transition:all .2s; }
    .cal-nav-btn:hover { border-color:var(--primary); color:var(--primary); }
    .cal-month-title { font-size:20px; font-weight:800; flex:1; }
    .view-btns { display:flex; gap:4px; }
    .view-btn { padding:7px 14px; border:1px solid var(--border); border-radius:8px; background:none; color:var(--text-2); cursor:pointer; font-size:13px; font-weight:500; transition:all .2s; }
    .view-btn.active { background:var(--primary-dim); color:var(--primary); border-color:var(--primary); }

    /* Calendar grid */
    .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
    .cal-day-header { text-align:center; font-size:11px; font-weight:700; color:var(--text-2); padding:8px 4px; text-transform:uppercase; letter-spacing:.05em; }
    .cal-cell {
      min-height:110px; background:var(--surface); border:1px solid var(--border);
      border-radius:10px; padding:8px; cursor:pointer;
      transition:all .2s; display:flex; flex-direction:column; gap:4px;
    }
    .cal-cell:hover { border-color:var(--primary); background:var(--surface-2); }
    .cal-cell.today { border-color:var(--primary); background:var(--primary-dim); }
    .cal-cell.other-month { opacity:.35; }
    .cal-date { font-size:13px; font-weight:700; margin-bottom:2px; }
    .cal-cell.today .cal-date { color:var(--primary); }

    /* Content slots */
    .content-slot {
      display:flex; align-items:center; gap:5px;
      padding:3px 7px; border-radius:6px; font-size:11px; font-weight:600;
      cursor:pointer; transition:all .15s; overflow:hidden; white-space:nowrap;
    }
    .content-slot:hover { opacity:.8; transform:scale(1.02); }
    .slot-tiktok { background:rgba(254,44,85,0.15); color:var(--tiktok); }
    .slot-facebook { background:rgba(24,119,242,0.15); color:var(--facebook); }
    .slot-zalo { background:rgba(1,144,243,0.15); color:var(--zalo); }
    .slot-instagram { background:rgba(225,48,108,0.15); color:var(--instagram); }
    .content-slot .slot-dot { width:5px; height:5px; border-radius:50%; background:currentColor; flex-shrink:0; }
    .content-slot .slot-text { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

    .add-slot-btn {
      display:flex; align-items:center; gap:3px;
      font-size:10px; color:var(--text-3); cursor:pointer;
      padding:2px 0; transition:color .2s; margin-top:auto;
    }
    .add-slot-btn:hover { color:var(--primary); }

    /* Week view */
    .week-grid { display:grid; grid-template-columns:60px repeat(7,1fr); gap:1px; background:var(--border); border-radius:12px; overflow:hidden; }
    .week-time { background:var(--bg-800); padding:8px 6px; font-size:11px; color:var(--text-3); text-align:right; }
    .week-day-header { background:var(--bg-800); padding:10px 8px; font-size:12px; font-weight:700; text-align:center; }
    .week-cell { background:var(--surface); min-height:50px; padding:4px; position:relative; }
    .week-cell.today-col { background:var(--primary-dim); }

    /* Legend */
    .legend { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:18px; }
    .legend-item { display:flex; align-items:center; gap:6px; font-size:12px; font-weight:600; color:var(--text-2); }
    .legend-dot { width:10px; height:10px; border-radius:50%; }

    /* Slot modal  */
    .slot-preview { background:var(--bg-700); border-radius:10px; padding:12px; font-size:13px; color:var(--text-2); margin-top:12px; white-space:pre-wrap; line-height:1.6; max-height:200px; overflow-y:auto; }
  </style>
</head>
<body>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo"><span class="logo-icon">✦</span><span class="logo-text">SmartMkt <span class="logo-accent">AI</span></span></div>
    </div>
    <nav class="sidebar-nav">

        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/><rect x="14" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/><rect x="3" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/><rect x="14" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/></svg>
        Dashboard

      <a href="content.html" class="nav-item">

        Content AI
      </a>
      <div class="nav-label-group">Marketing</div>
      <a href="campaign.html" class="nav-item">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><polygon points="11,5 2,12 11,19" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><polygon points="22,5 13,12 22,19" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>

      <a href="calendar.html" class="nav-item active">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2"/><line x1="16" y1="2" x2="16" y2="6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="8" y1="2" x2="8" y2="6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="3" y1="10" x2="21" y2="10" stroke="currentColor" stroke-width="2"/></svg>
        Lịch Content
      </a>
      <a href="audience.html" class="nav-item">

        Audience Intel
      </a>
      <div class="nav-label-group">Quản lý</div>
      <a href="customers.html" class="nav-item">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" stroke="currentColor" stroke-width="2"/><circle cx="9" cy="7" r="4" stroke="currentColor" stroke-width="2"/></svg>
        Khách hàng
      </a>
      <a href="analytics.html" class="nav-item">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><polyline points="22,12 18,12 15,21 9,3 6,12 2,12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Analytics
      </a>
      <a href="pricing.html" class="nav-item">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><line x1="12" y1="1" x2="12" y2="23" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        Pricing
      </a>
      <a href="settings.html" class="nav-item">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" stroke="currentColor" stroke-width="2"/></svg>
        Cài đặt
      </a>
    </nav>
    <div class="sidebar-footer"><a href="index.html" class="nav-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>Về Landing Page</a></div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="topbar-left">
        <div class="topbar-title">📅 Lịch Content</div>
        <div class="topbar-sub">Lên kế hoạch content đa kênh — TikTok · Facebook · Zalo · Instagram</div>
      </div>
      <div class="topbar-right">
        <button class="btn-ghost" id="btnQuickFill">⚡ AI Tự lên lịch</button>
        <button class="btn-primary" id="btnAddSlot">+ Thêm bài</button>
      </div>
    </div>

    <div class="content">
      <!-- Legend -->
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--tiktok)"></div>TikTok</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--facebook)"></div>Facebook</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--zalo)"></div>Zalo</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--instagram)"></div>Instagram</div>
        <div style="margin-left:auto;display:flex;gap:8px;align-items:center;">
          <div class="view-btns">
            <button class="view-btn active" data-view="month">Tháng</button>
            <button class="view-btn" data-view="week">Tuần</button>
          </div>
        </div>
      </div>

      <!-- Calendar header -->
      <div class="cal-header">
        <button class="cal-nav-btn" id="btnPrev">‹</button>
        <div class="cal-month-title" id="calMonthTitle"></div>
        <button class="cal-nav-btn" id="btnToday">Hôm nay</button>
        <button class="cal-nav-btn" id="btnNext">›</button>
      </div>

      <!-- Day headers -->
      <div class="cal-grid" id="calDayHeaders" style="margin-bottom:4px;">
        <div class="cal-day-header">T2</div>
        <div class="cal-day-header">T3</div>
        <div class="cal-day-header">T4</div>
        <div class="cal-day-header">T5</div>
        <div class="cal-day-header">T6</div>
        <div class="cal-day-header" style="color:var(--primary)">T7</div>
        <div class="cal-day-header" style="color:var(--danger)">CN</div>
      </div>

      <!-- Calendar body -->
      <div class="cal-grid" id="calGrid"></div>
    </div>
  </main>

  <!-- SLOT MODAL -->
  <div class="modal-overlay" id="slotModal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="slotModalTitle">📝 Thêm bài đăng</div>
        <button class="modal-close" id="slotModalClose">✕</button>
      </div>
      <div class="form-group">
        <label class="form-label">Ngày đăng</label>
        <input class="form-input" id="slotDate" type="date" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Kênh</label>
          <select class="form-select" id="slotChannel">
            <option value="tiktok">🎵 TikTok</option>
            <option value="facebook">👥 Facebook</option>
            <option value="zalo">💬 Zalo</option>
            <option value="instagram">📸 Instagram</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Giờ đăng</label>
          <input class="form-input" id="slotTime" type="time" value="19:00" />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Title / Chủ đề bài</label>
        <input class="form-input" id="slotTitle" placeholder="VD: Review trà sữa mango mới về" />
      </div>
      <div class="form-group">
        <label class="form-label">Loại content</label>
        <div class="goal-chips" id="slotTypePicker">
          <button class="goal-chip selected" data-type="caption">Caption</button>
          <button class="goal-chip" data-type="tiktok_script">TikTok Script</button>
          <button class="goal-chip" data-type="ad_copy">Quảng cáo</button>
          <button class="goal-chip" data-type="story">Story</button>
          <button class="goal-chip" data-type="promo">Promo</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Trạng thái</label>
        <div class="goal-chips" id="slotStatusPicker">
          <button class="goal-chip selected" data-status="planned">📝 Đã lên kế hoạch</button>
          <button class="goal-chip" data-status="draft">📄 Bản nháp</button>
          <button class="goal-chip" data-status="ready">✅ Sẵn sàng</button>
          <button class="goal-chip" data-status="posted">🚀 Đã đăng</button>
        </div>
      </div>
      <div style="display:flex;gap:10px;">
        <button class="btn-ghost" id="btnAIGenSlot" style="flex:1;justify-content:center;">⚡ AI tạo content ngay</button>
        <button class="btn-primary" id="btnSaveSlot" style="flex:1;justify-content:center;">Lưu</button>
      </div>
    </div>
  </div>

  <div id="toastContainer"></div>
  <script src="calendar.js"></script>
</body>
</html>
